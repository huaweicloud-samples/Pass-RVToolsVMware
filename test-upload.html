<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 50px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        .test-section {
            margin: 30px 0;
            padding: 20px;
            border: 2px solid #1890FF;
            border-radius: 10px;
        }
        
        h2 {
            color: #1890FF;
            margin-top: 0;
        }
        
        .upload-btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #1890FF 0%, #0050B3 100%);
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3);
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(24, 144, 255, 0.4);
        }
        
        input[type="file"] {
            display: none;
        }
        
        #status {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        
        .success {
            background: #f6ffed;
            border: 1px solid #52c41a;
            color: #52c41a;
        }
        
        .error {
            background: #fff2f0;
            border: 1px solid #f5222d;
            color: #f5222d;
        }
    </style>
</head>
<body>
    <h1>文件上传功能测试</h1>
    
    <div class="test-section">
        <h2>测试1: 点击按钮上传</h2>
        <input type="file" id="fileInput1" accept=".xlsx,.xls">
        <button class="upload-btn" onclick="document.getElementById('fileInput1').click()">
            📂 选择Excel文件
        </button>
        <div id="status1"></div>
    </div>
    
    <div class="test-section">
        <h2>测试2: 拖拽上传</h2>
        <div id="dropZone" style="border: 3px dashed #1890FF; padding: 40px; text-align: center; border-radius: 10px;">
            <p style="color: #8c8c8c;">将Excel文件拖拽到此处</p>
        </div>
        <div id="status2"></div>
    </div>

    <script>
        // 测试1: 点击上传
        document.getElementById('fileInput1').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                testFileUpload(file, 'status1');
            }
        });
        
        // 测试2: 拖拽上传
        const dropZone = document.getElementById('dropZone');
        
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropZone.style.borderColor = '#52c41a';
            dropZone.style.background = '#f6ffed';
        });
        
        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            dropZone.style.borderColor = '#1890FF';
            dropZone.style.background = 'white';
        });
        
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.style.borderColor = '#1890FF';
            dropZone.style.background = 'white';
            
            const file = e.dataTransfer.files[0];
            if (file) {
                testFileUpload(file, 'status2');
            }
        });
        
        function testFileUpload(file, statusId) {
            const status = document.getElementById(statusId);
            
            // 显示文件信息
            let html = `<div class="success">`;
            html += `✅ 文件已选择\n`;
            html += `文件名: ${file.name}\n`;
            html += `文件大小: ${(file.size / 1024 / 1024).toFixed(2)} MB\n`;
            html += `文件类型: ${file.type}\n`;
            html += `</div>`;
            
            status.innerHTML = html;
            
            // 尝试读取文件
            const reader = new FileReader();
            
            reader.onload = function(e) {
                let html = status.innerHTML;
                html += `\n<div class="success">✅ 文件读取成功!</div>`;
                status.innerHTML = html;
            };
            
            reader.onerror = function() {
                let html = status.innerHTML;
                html += `\n<div class="error">❌ 文件读取失败</div>`;
                status.innerHTML = html;
            };
            
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
